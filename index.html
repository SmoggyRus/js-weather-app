<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="script.js" defer></script>
</head>
<body>
<main class="card">
    <header class="search">
        <label for="city-input" class="visually-hidden">City name</label>
        <input id="city-input" type="text" placeholder="Enter city name" spellcheck="false">
        <button type="button"><img src="images/search.png" alt="Search"></button>
    </header>
    <section class="error">
        <p>Invalid city name</p>
    </section>
    <section class="weather">
        <img src="images/rain.png" class="weather-icon" alt="Weather condition">
        <h1 class="temperature">20℃</h1>
        <h2 class="city">Chelyabinsk</h2>
        <div class="details">
            <div class="col">
                <img src="images/humidity.png" alt="">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="images/wind.png" alt="">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
